{% extends "base.html" %}

{% block title %}Início - Calculadora de Gorjeta{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">Calculadora de Gorjeta</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('index') }}" method="POST">
                    <div class="mb-3">
                        <label for="valor_conta" class="form-label">Valor total da conta (R$)</label>
                        <input type="number" step="0.01" class="form-control" id="valor_conta" name="valor_conta" 
                               placeholder="Ex: 100.00" value="{{ request.form.get('valor_conta', '') }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="quantidade_pessoas" class="form-label">Quantidade de pessoas</label>
                        <input type="number" step="1" min="1" class="form-control" id="quantidade_pessoas" name="quantidade_pessoas" 
                               placeholder="Ex: 2" value="{{ request.form.get('quantidade_pessoas', '') }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="percentual_gorjeta" class="form-label">Percentual de gorjeta (%)</label>
                        <input type="number" step="0.1" class="form-control" id="percentual_gorjeta" name="percentual_gorjeta" 
                               placeholder="Ex: 10" value="{{ request.form.get('percentual_gorjeta', '') }}" required>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="reset" class="btn btn-outline-secondary">Limpar</button>
                        <button type="submit" class="btn btn-primary">Calcular</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
